name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - software/refactor
    paths:
      - 'docs/**'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject build timestamp into Service Worker
        run: |
          BUILD_TIME=$(date -u +"%Y%m%d%H%M%S")
          sed -i "s/const CACHE_NAME = 'pulsar-c6-[^']*'/const CACHE_NAME = 'pulsar-c6-${BUILD_TIME}'/" docs/sw.js
          echo "SW cache version: pulsar-c6-${BUILD_TIME}"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: true
          cname: ''
